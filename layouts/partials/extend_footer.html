<canvas id="c"></canvas>

<script>
(function(){
    const cv = document.getElementById('c');
    const ctx = cv.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    
    let W, H;
    // On réduit un peu la résolution de la grille pour la fluidité de l'animation
    const COLS = 100, ROWS = 60; 
    const g = new Float32Array((COLS + 1) * (ROWS + 1));

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        cv.width = W * dpr;
        cv.height = H * dpr;
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resize);
    resize();

    // On ajoute des propriétés de mouvement (vx, vy) et des positions de base
    const PEAKS = [
        { cx: 0.18, cy: 0.42, a: 1.1, sx: 0.15, sy: 0.20, phase: 0, speed: 0.0005 },
        { cx: 0.52, cy: 0.22, a: 1.8, sx: 0.20, sy: 0.25, phase: 2, speed: 0.0007 },
        { cx: 0.80, cy: 0.62, a: 1.5, sx: 0.18, sy: 0.22, phase: 4, speed: 0.0004 },
        { cx: 0.32, cy: 0.74, a: 1.2, sx: 0.15, sy: 0.18, phase: 1, speed: 0.0006 },
        { cx: 0.90, cy: 0.18, a: 0.9, sx: 0.12, sy: 0.14, phase: 5, speed: 0.0008 }
    ];

    function field(x, y, time) {
        let v = 0;
        for (const p of PEAKS) {
            // On fait osciller doucement la position des sommets avec Math.sin/cos
            const ox = p.cx + Math.cos(time * p.speed + p.phase) * 0.1;
            const oy = p.cy + Math.sin(time * p.speed + p.phase) * 0.1;
            
            const dx = (x - ox) / p.sx;
            const dy = (y - oy) / p.sy;
            v += p.a * Math.exp(-(dx * dx + dy * dy) * 0.5);
        }
        return v;
    }

    function lerp(a, b, t) { return a + t * (b - a); }
    function ei(va, vb, lv) {
        const d = vb - va;
        return Math.abs(d) < 1e-12 ? 0.5 : Math.max(0, Math.min(1, (lv - va) / d));
    }

    function animate(time) {
        const isDark = document.body.classList.contains('dark') || 
                       matchMedia('(prefers-color-scheme:dark)').matches;

        // 1. Nettoyage et fond
        ctx.fillStyle = isDark ? '#1c1c1a' : '#ffffff';
        ctx.fillRect(0, 0, W, H);

        // 2. Mise à jour de la grille de relief
        let lo = Infinity, hi = -Infinity;
        for (let j = 0; j <= ROWS; j++) {
            for (let i = 0; i <= COLS; i++) {
                const v = field(i / COLS, j / ROWS, time);
                g[j * (COLS + 1) + i] = v;
                if (v < lo) lo = v;
                if (v > hi) hi = v;
            }
        }

        // 3. Dessin des courbes
        ctx.strokeStyle = isDark ? 'rgba(210,205,190,0.2)' : 'rgba(35,35,30,0.08)';
        ctx.lineWidth = 0.9;
        const LEVELS = 20;

        for (let l = 1; l < LEVELS; l++) {
            const lv = lo + (l / LEVELS) * (hi - lo);
            ctx.beginPath();
            for (let j = 0; j < ROWS; j++) {
                for (let i = 0; i < COLS; i++) {
                    const v00 = g[j * (COLS + 1) + i];
                    const v10 = g[j * (COLS + 1) + i + 1];
                    const v11 = g[(j + 1) * (COLS + 1) + i + 1];
                    const v01 = g[(j + 1) * (COLS + 1) + i];
                    
                    const code = (v00 > lv ? 8 : 0) | (v10 > lv ? 4 : 0) | (v11 > lv ? 2 : 0) | (v01 > lv ? 1 : 0);
                    if (code === 0 || code === 15) continue;

                    const x0 = i / COLS * W, y0 = j / ROWS * H;
                    const x1 = (i + 1) / COLS * W, y1 = (j + 1) / ROWS * H;

                    const T = [lerp(x0, x1, ei(v00, v10, lv)), y0];
                    const R = [x1, lerp(y0, y1, ei(v10, v11, lv))];
                    const B = [lerp(x0, x1, ei(v01, v11, lv)), y1];
                    const L = [x0, lerp(y0, y1, ei(v00, v01, lv))];

                    let segments = [];
                    switch (code) {
                        case 1:  segments = [[L, B]]; break;
                        case 2:  segments = [[B, R]]; break;
                        case 3:  segments = [[L, R]]; break;
                        case 4:  segments = [[T, R]]; break;
                        case 5:  segments = [[T, R], [L, B]]; break;
                        case 6:  segments = [[T, B]]; break;
                        case 7:  segments = [[T, L]]; break;
                        case 8:  segments = [[T, L]]; break;
                        case 9:  segments = [[T, B]]; break;
                        case 10: segments = [[T, L], [B, R]]; break;
                        case 11: segments = [[T, R]]; break;
                        case 12: segments = [[L, R]]; break;
                        case 13: segments = [[B, R]]; break;
                        case 14: segments = [[L, B]]; break;
                    }
                    for (const [p, q] of segments) {
                        ctx.moveTo(p[0], p[1]);
                        ctx.lineTo(q[0], q[1]);
                    }
                }
            }
            ctx.stroke();
        }
        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
})();
</script>
