baseURL = "https://www.lempreinte.site/"
canonifyURLs = false
languageCode = 'fr-fr'
defaultContentLanguage = 'fr'
title = 'Lempreinte'
theme = 'PaperMod'

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true


[languages]
  [languages.fr]
    languageName = 'Français'
    contentDir = 'content'
    weight = 1

[params]
  # Ce format correspond à Jour Mois Année
  BookDateFormat = "2 January 2006"
  showSnippet = true
  # Force le mode clair (ou "dark" si tu préfères le sombre)
  defaultTheme = "light"
  # Désactive le bouton de changement de mode
  disableThemeToggle = true
  
[params.label]
    text = "Lempreinte" # Le texte qui restera à côté du logo
    icon = "/images/logo.png" # Chemin vers ton logo
    iconHeight = 40 # Ajuste la hauteur pour qu'il s'aligne bien avec le texte

[params.searchConfig]
layout = "search"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]


[[menu.main]]
    identifier = "lempreinte"
    name = "L'entreprise"
    url = "/lempreinte/"
    weight = 20

[[menu.main]]
    identifier = "search"
    name = "Rechercher un produit"
    url = "/search/"
    weight = 10

[[menu.main]]
    identifier = "acv"
    name = "Réaliser une ACV"
    url = "/acv/"
    weight = 30
