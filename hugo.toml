baseURL = "https://www.lempreinte.site/"
canonifyURLs = false
languageCode = 'fr-fr'
defaultContentLanguage = 'fr'
title = 'Lempreinte'
theme = 'PaperMod'

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true


[languages]
  [languages.fr]
    languageName = 'Français'
    contentDir = 'content'
    weight = 1

[params]
  # Ce format correspond à Jour Mois Année
  BookDateFormat = "2 January 2006"
  showSnippet = true
  
[params.searchConfig]
layout = "search"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 2
    keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 40

[[menu.main]]
    identifier = "lempreinte"
    name = "L'entreprise"
    url = "/lempreinte/"
    weight = 20

[[menu.main]]
    identifier = "search"
    name = "Rechercher"
    url = "/search/"
    weight = 10

[[menu.main]]
    identifier = "acv"
    name = "Réaliser une ACV"
    url = "/acv/"
    weight = 30
